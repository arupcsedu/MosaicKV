repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff check
        entry: ruff check
        language: system
        types: [python]
      - id: ruff-format
        name: Ruff format check
        entry: ruff format --check
        language: system
        types: [python]
      - id: mypy
        name: MyPy
        entry: mypy src tests scripts/verify_envs.py
        language: system
        pass_filenames: false
        types: [python]
      - id: pytest
        name: Pytest
        entry: pytest -q
        language: system
        pass_filenames: false
        types: [python]
