matrix_schema_version: 1
matrix_revision: 1
capability_catalog_version: common-env-2026-07-21-v1
experiment_id: main_quality
description: Main byte-matched quality matrix over three pinned image/video-language models.
enabled: true

axes:
  models: [llava_1_5_7b, qwen2_5_vl_3b, qwen2_5_vl_7b, llava_onevision_7b_optional]
  backends: [hf_eager, hf_sdpa, hf_flash_attention_2, vllm, sglang]
  methods: [full_kv, random_kv, prompt_attention_topk, lookm_reimpl, prefixkv_reimpl, vl_cache_reimpl, mosaickv_exact, mosaickv_proto, mosaickv_full]
  tasks: [mmstar, mmvet, textvqa, docvqa, chartqa, videomme]
  retention_ratios: [1.0, 0.8, 0.6, 0.4, 0.2, 0.1, 0.05]
  output_lengths: [32, 64, 128]
  selection_seeds: [17, 29, 43]

generation:
  deterministic: true
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  output_length_policy: fixed_max_new_tokens

performance:
  warmups: 5
  timed_repetitions: 20

comparison:
  primary_budget: active_kv_bytes
  nominal_retention_only_for_scheduling: true
  require_realized_byte_match_before_aggregation: true

run:
  output_root: /scratch/djy8hg/runs/mosaickv/experiments/main_quality
  cache_root: /scratch/djy8hg/cache/mosaickv
  subset_size: null
  measurement_mode: main_quality
  resume: true

sweeps:
  - name: llava_full_reference
    models: [llava_1_5_7b]
    backends: [hf_eager]
    methods: [full_kv]
    tasks: [mmstar, mmvet, textvqa, docvqa, chartqa]
    retention_ratios: [1.0]
    output_lengths: [32, 64, 128]
    selection_seeds: [17, 29, 43]
    variant: full_reference
  - name: llava_common_compressors
    models: [llava_1_5_7b]
    backends: [hf_eager]
    methods: [random_kv, prompt_attention_topk, mosaickv_exact]
    tasks: [mmstar, mmvet, textvqa, docvqa, chartqa]
    retention_ratios: [1.0, 0.8, 0.6, 0.4, 0.2, 0.1, 0.05]
    output_lengths: [32, 64, 128]
    selection_seeds: [17, 29, 43]
    variant: common_compressor
  - name: llava_published_reimplementations
    models: [llava_1_5_7b]
    backends: [hf_eager]
    methods: [lookm_reimpl]
    tasks: [mmstar, mmvet, textvqa, docvqa, chartqa]
    retention_ratios: [1.0, 0.8, 0.6, 0.4, 0.2, 0.1, 0.05]
    output_lengths: [32, 64, 128]
    selection_seeds: [17, 29, 43]
    variant: paper_reimplementation
  - name: qwen_full_reference
    models: [qwen2_5_vl_3b, qwen2_5_vl_7b]
    backends: [hf_eager]
    methods: [full_kv]
    tasks: [mmstar, mmvet, textvqa, docvqa, chartqa, videomme]
    retention_ratios: [1.0]
    output_lengths: [32, 64, 128]
    selection_seeds: [17, 29, 43]
    variant: full_reference
  - name: qwen_common_compressors
    models: [qwen2_5_vl_3b, qwen2_5_vl_7b]
    backends: [hf_eager]
    methods: [random_kv, prompt_attention_topk, mosaickv_exact]
    tasks: [mmstar, mmvet, textvqa, docvqa, chartqa, videomme]
    retention_ratios: [1.0, 0.8, 0.6, 0.4, 0.2, 0.1, 0.05]
    output_lengths: [32, 64, 128]
    selection_seeds: [17, 29, 43]
    variant: common_compressor

blocked:
  - scope:
      backends: [hf_sdpa, hf_flash_attention_2, vllm, sglang]
    reason: Only HF eager currently owns and exposes the mutable cache interface safely.
  - scope:
      methods: [mosaickv_proto, mosaickv_full]
    reason: Prototype merge and residual repair remain disabled by every registered adapter.
  - scope:
      methods: [prefixkv_reimpl]
    reason: Paper-result rows require an immutable offline layer profile and disjoint calibration IDs.
  - scope:
      methods: [vl_cache_reimpl]
    reason: Pinned disjoint calibration and checkpoint-specific retention-1 parity are not available.
  - scope:
      models: [llava_onevision_7b_optional]
    reason: Optional model; no exact registered 7B adapter or clean parity evidence exists.
  - scope:
      models: [llava_1_5_7b]
      tasks: [videomme]
    reason: LLaVA-1.5 is image-only in the registered adapter.
