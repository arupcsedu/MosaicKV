schema_version: 1
method: vl_cache_reimpl

model:
  # The paper used LLaVA-v1.6 checkpoints. This audited HF checkpoint is a
  # development target only and must not be labeled an exact paper reproduction.
  id: llava-hf/llava-1.5-7b-hf
  revision: b234b804b114d9e37bb655e11cbbb5f5e971b7a9
  precision: bf16

dataset:
  id: mosaickv/synthetic-ci
  revision: schema-v1
  split: test

execution:
  backend: huggingface
  attention_implementation: eager
  seed: 0
  deterministic_algorithms: true

generation:
  max_new_tokens: 16
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  output_length_policy: fixed_max_new_tokens

cache:
  budget_value: 2147483647
  budget_unit: blocks
  retention_ratio: 0.1
  block_size: 1
  accounting_spec_sha: 60915ac01ad35843c4de56620864145d5b81b973a3bfec03fb322d5e4f6ff695

forecasting:
  enabled: false
  mode: prompt_window
  prompt_window: 1
  draft_steps: 0
  centroid_count: 1
  covariance: diagonal
  low_memory_centroids: true
  centroid_iterations: 1

graph:
  enabled: false
  max_neighbors: 8
  min_edge_weight: 0.0
  similarity_chunk_size: 256

utility:
  lambda_q: 1.0
  lambda_v: 0.25
  lambda_o: 0.25

selection:
  enabled: false
  algorithm: lazy_greedy
  lambda_g: -0.25
  lambda_m: -0.25
  stop_on_nonpositive_gain: true
  exhaustive_max_nodes: 20

prototypes:
  enabled: false
  group_size: 4
  max_position_span: 128
  min_anchor_weight: 0.0
  allowed_modality_pairs: [text:text, image:image, video:video]

residual:
  enabled: false
  rank: 8
  storage_dtype: lossless
  require_pinned_memory: false

repair:
  enabled: false
  policy: none
  entropy_threshold: 0.5
  prototype_risk_threshold: 0.25
  max_blocks_per_step: 0
  evaluation_only: false

vl_cache:
  enabled: true
  sparsity_threshold: 0.01
  min_layer_retention: 0.01
  max_layer_retention: 1.0
  # Paper experiment interpretation: protect floor(0.1 * realized layer budget).
  recent_window_fraction: 0.1
  # null uses every post-vision prompt token; set 50 only for the paper's speed setup.
  max_post_vision_queries: null
  calibration_dataset_id: null
  calibration_dataset_revision: null
  calibration_split: null
  calibration_sample_ids: []
